<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Espoir de la Rue — Unis pour la différence</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #F5C842;
      --gold-light: #FDE68A;
      --gold-dark: #D4A017;
      --dark: #1A1206;
      --dark2: #2C1F08;
      --cream: #FDF6E3;
      --warm: #F9EFD3;
      --text: #3D2B0E;
      --muted: #8A6F47;
      --white: #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); overflow-x: hidden; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px;
      background: rgba(26,18,6,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(245,200,66,0.15);
    }

    .nav-logo img { height: 40px; }

    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--gold); }
    .nav-cta { background: var(--gold); color: var(--dark) !important; padding: 9px 22px; border-radius: 100px; font-weight: 600 !important; }

    section { padding: 100px 48px; }

    .cot-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--gold);
      color: var(--dark);
      padding: 18px 40px;
      border-radius: 100px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
    }

    .cot-btn img { width: 28px; height: 28px; }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <img src="https://cheikhahmeth11.github.io/Espoir-de-la-rue/logo.jpeg" alt="Espoir de la Rue">
  </div>
  <ul class="nav-links">
    <li><a href="#accueil">Accueil</a></li>
    <li><a href="#presentation">Association</a></li>
    <li><a href="#galerie">Galerie</a></li>
    <li><a href="#objectif">Objectifs</a></li>
    <li><a href="#cotisation" class="nav-cta">Participer 💛</a></li>
  </ul>
</nav>

<section id="cotisation">
  <div style="text-align:center;">
    <h2>Payer votre cotisation</h2>
    <br><br>

<a href="https://pay.wave.com/m/M_sn_e9HWEKsQTcy5/c/sn/" target="_blank" class="cot-btn">
  <img src="https://cheikhahmeth11.github.io/Espoir-de-la-rue/wave.png" alt="Wave"/>
  Payer avec Wave
</a>

  </div>
</section>

</body>
</html>
